id: flutter-riverpod-openapi
platform: flutter
state_management: riverpod
api_contract: openapi
architecture: feature-first
paths:
  presentation: lib/features/*/presentation/**
  state: lib/features/*/state/**
  domain: lib/features/*/domain/**
  data: lib/features/*/data/**
  core_network: lib/core/network/**
  design_system: lib/core/design_system/**
generated_file_policy: do-not-edit-by-hand
frontend_allowed_files:
  - lib/features/*/presentation/**
  - lib/features/*/state/**
  - lib/features/*/domain/**
  - lib/features/*/data/repositories/mock/**
  - lib/features/*/data/fixtures/**
  - lib/core/design_system/**
  - test/features/**
frontend_forbidden_files:
  - lib/features/*/data/repositories/real/**
  - lib/core/network/**
  - server/**
  - backend/**
  - openapi/**
  - .env
  - secrets/**
backend_allowed_files:
  - server/**
  - backend/**
  - openapi/**
  - migrations/**
backend_forbidden_files:
  - lib/features/*/presentation/**
  - lib/core/design_system/**
layer_mapping:
  L0:
    - lib/features/*/presentation/**
    - lib/core/design_system/**
  L1:
    - lib/features/*/state/**
    - lib/features/*/domain/**
    - lib/features/*/data/repositories/mock/**
  L2:
    - lib/features/*/data/repositories/interfaces/**
    - openapi/**
  L3:
    - server/services/**
    - backend/domain/**
  L4:
    - server/infrastructure/**
    - backend/integrations/**

# --- Host integration / composition boundary -----------------------------
# Where a feature screen is allowed to sit inside the running app, and which
# host-owned chrome it must NOT re-implement. Prevents the "frontend shipped its
# own Lnb/TopBar/WindowChrome and double-nested under the host shell" failure.
# Override per-feature in inputs/<feature>/profile.yaml when a feature owns its
# own shell (e.g. a full-screen onboarding flow).
composition:
  feature_scope: body-only          # body-only | full-shell
  host_shell: existing              # the host app already provides the shell
  host_owns:                        # feature must NOT build or nest these
    - left-nav / Lnb
    - top-bar / app-bar
    - window-chrome / title-bar
  feature_mounts_at: app body slot  # where the host embeds the feature

# --- In-process contract surface (not just the HTTP/OpenAPI contract) -----
# For an in-process client like Flutter, the real binding is Dart code, not
# only the OpenAPI patch: the frontend imports backend-owned interfaces, error
# types, and value objects. Pin these to the MAIN canonical paths so the
# frontend cannot invent its own divergent stub (the exception-base-inverted
# `DeviceException` class of bug). When a feature is developed in a separate
# repo, the canonical paths below are the contract to import — never re-declare.
contract_surface:
  error_hierarchy: lib/core/errors.dart        # single canonical exception base
  repository_interfaces: lib/features/*/data/repositories/interfaces/**
  value_objects: lib/features/*/domain/**
  # The frontend MUST import these; declaring a parallel stub for any of them is
  # forbidden (see frontend_forbidden_files and the canonical-contract-pin step).
