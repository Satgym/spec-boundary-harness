feature: auth.login
title: 이메일 로그인
requirements:
  - id: auth.login.r1
    text: v1에서는 이메일 로그인만 확정 범위로 한다.
    category: decision
    owner_layer: L2
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: confirmed-scope, start: 5, end: 5 }
      - { doc: plaud/auth-summary.md, anchor: decisions, start: 5, end: 5 }

  - id: auth.login.r2
    text: 로그인은 이메일 + 비밀번호를 요구한다.
    category: decision
    owner_layer: L2
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: confirmed-scope, start: 6, end: 6 }

  - id: auth.login.r3
    text: 비밀번호 검증은 서버에서 수행한다.
    category: decision
    owner_layer: L3
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: confirmed-scope, start: 7, end: 7 }
      - { doc: plaud/auth-summary.md, anchor: decisions, start: 6, end: 6 }

  - id: auth.login.r4
    text: 로그인 화면은 initial, loading, success, invalid_credentials, account_locked, network_error 상태를 가진다.
    category: decision
    owner_layer: L1
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: confirmed-scope, start: 8, end: 8 }
      - { doc: plaud/auth-summary.md, anchor: action-items, start: 20, end: 20 }
      - { doc: design/login-design-notes.md, anchor: null, start: 6, end: 6 }

  - id: auth.login.r5
    text: 비밀번호 표시 토글은 presentation-only 상호작용으로 처리한다.
    category: decision
    owner_layer: L0
    assumption: false
    source_refs:
      - { doc: plaud/auth-summary.md, anchor: decisions, start: 7, end: 7 }
      - { doc: design/login-design-notes.md, anchor: null, start: 5, end: 5 }

  - id: auth.login.r6
    text: 카카오/구글/애플 등 소셜 로그인은 v1 확정 범위에서 제외된다 (현재는 proposal).
    category: proposal
    owner_layer: L2
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: out-of-scope, start: 12, end: 12 }
      - { doc: plaud/auth-summary.md, anchor: proposals, start: 11, end: 11 }
      - { doc: plaud/auth-transcript.md, anchor: null, start: 5, end: 6 }

  - id: auth.login.r7
    text: 로그인 버튼 클릭 시 POST /auth/login을 호출한다.
    category: decision
    owner_layer: L1
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: api-expectations, start: 16, end: 16 }
      - { doc: plaud/auth-transcript.md, anchor: null, start: 11, end: 11 }

  - id: auth.login.q1
    text: 로그인 실패 횟수 제한을 적용할 것인가?
    category: open_question
    owner_layer: L3
    assumption: false
    source_refs:
      - { doc: prd/auth.md, anchor: open-items, start: 20, end: 20 }
      - { doc: plaud/auth-summary.md, anchor: open-questions, start: 15, end: 15 }
      - { doc: plaud/auth-transcript.md, anchor: null, start: 7, end: 7 }

  - id: auth.login.a1
    text: 백엔드는 POST /auth/login 스키마를 확정한다.
    category: action_item
    owner_layer: L2
    assumption: false
    source_refs:
      - { doc: plaud/auth-summary.md, anchor: action-items, start: 19, end: 19 }

  - id: auth.login.a2
    text: 프론트는 6가지 화면 상태(initial/loading/success/invalid_credentials/account_locked/network_error)를 모두 구현한다.
    category: action_item
    owner_layer: L1
    assumption: false
    source_refs:
      - { doc: plaud/auth-summary.md, anchor: action-items, start: 20, end: 20 }
